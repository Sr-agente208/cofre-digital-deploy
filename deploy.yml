# .github/workflows/deploy.yml
# Pipeline de deploy usando secrets do GitHub (o "cofre digital")

name: Deploy Cofre Digital

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: |
          docker build -f docker/Dockerfile -t cofre-digital:latest .

      - name: Testar a aplicação
        run: |
          # Subindo container com secrets injetados pelo GitHub (nunca hardcoded!)
          docker run -d --name cofre-test \
            -p 5000:5000 \
            -e ENVIRONMENT=production \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e EXTERNAL_API_KEY=${{ secrets.EXTERNAL_API_KEY }} \
            cofre-digital:latest

          # Aguarda a aplicação iniciar
          sleep 5

          # Testa os endpoints
          curl -f http://localhost:5000/ || exit 1
          curl -f http://localhost:5000/database || exit 1
          curl -f http://localhost:5000/api-key || exit 1

          echo "Todos os testes passaram!"

      - name: Parar container de teste
        if: always()
        run: docker stop cofre-test && docker rm cofre-test
